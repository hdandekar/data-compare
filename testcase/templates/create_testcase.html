{% extends 'base.html' %}
{% block title %}Create Test Case{% endblock  %}
{% block content %}

<div class="container">
<div class="col-md-9">
    <h3>Create Test Case</h3>
</div>
<form action= "." method="post">

    {% comment %} {% for field in form %}
        <div class="form-row">
            <label class="col-sm-2 col-form-label">{{ field.label_tag }}</label>
            <div class="col-sm-3">
                {{ field }}
            </div>
        </div>
    {% endfor %} {% endcomment %}

    <div class="col-md-9">
        <div class="form-group row" >
            <label for="tcname" class="col-2 col-form-label">TC Name:</label>
            <div class="col-10">
                <input type="text" class="form-control" id="tcname" placeholder="Enter Test Case Name" name="tcname">
            </div>
        </div>

        <div class="form-group row">
            <label for="sourcedbid" class="col-2 col-form-label" >Source DB:</label>
            <div class="col-10">
                <select id ="sourcedbid" name="sourcedbid" class="form-control col-sm-3">
                    {% for item in connection_list %}
                        <option value="{{item.id}}">{{item.name}}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group row ">
            <label for="sourcesql" class="col-2 col-form-label">Source SQL:</label>
            <div class="col-10">
                <textarea id="sourcesql"  name="sourcesql" class="form-control"></textarea>
            </div>
        </div>
        <div class="form-group row">
            <label for="targetdbid" class="col-2 col-form-label bold" >Target DB:</label>
            <div class="col-10">
                <select id ="targetdbid" name="targetdbid" class="form-control col-sm-3">
                    {% for item in connection_list %}
                        <option value="{{item.id}}">{{item.name}}</option>
                    {% endfor %}
                </select>
            </div>
        </div>        
        <div class="form-group row">
            <label for="targetsql" class="col-sm-2 col-form-label">Target SQL:</label>
            <div class="col-10">
                <textarea id="targetsql" name="targetsql" class="form-control"></textarea>
            </div>
        </div>

        <div class="form-group row">
            <label for="keycolumns" class="col-sm-2 col-form-label">Key Columns:</label>
            <div class="col-sm-10">
                <input type="text" id="keycolumns" name="keycolumns" class="form-control"></input>
            </div>
        </div>
        <div class="form-group row">
            <div class="col-sm-10">
            <button type="submit" class="col-sm-2 col-form-label btn btn-primary">Save</button>
            <div>
        </div>
    </div>
{% csrf_token %}
</form>

</div>
{% endblock  %}
